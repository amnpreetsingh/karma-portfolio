
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARMA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

    <div class="background"></div>
    <div class="hero-section">

    <h1 class="title">KARMA</h1>

        <svg class="lightning-line" viewBox="0 0 600 100">
    
    <!-- glowing streak -->
    <line 
        id="lightningPath"
        x1="50"
        y1="50"
        x2="550"
        y2="50"
        stroke="white"
        stroke-width="2.5"
        stroke-linecap="round"
    />

    <!-- bright endpoint -->
    <circle
        id="rayDot"
        cx="550"
        cy="50"
        r="5"
        fill="white"
    />
    
</svg> 
         <p class="hero-quote" id="heroQuote"></p>
    </div>

    <div class="tile-container">
       <div class="tile" data-message="Knowledge is dangerous when memorized, powerful when lived.">
    <div class="tile-inner">K</div>
</div>

<div class="tile" data-message="Even atoms align when intentions are clear.">
    <div class="tile-inner">A</div>
</div>

<div class="tile" data-message="Pressure introduces people to themselves.">
    <div class="tile-inner">R</div>
</div>

<div class="tile" data-message="Dreams remain fiction without movement.">
    <div class="tile-inner">M</div>
</div>

<div class="tile" data-message="Everything returns—energy, effort, love.">
    <div class="tile-inner">A</div>
</div>
    </div>

    <div id="messageBox"></div>

    <div class="comment-section">
        <h2>Leave Your Trace</h2>
        <form id="commentForm">
            <input type="text" id="nameInput" placeholder="Your name">
            <textarea id="commentInput" placeholder="Leave a thought..."></textarea>
            <div class="g-recaptcha" data-sitekey="6Lfk3c4sAAAAAFCoqMHVLMubCcaM9JcqE-qjShyJ"></div>
            <button type="submit">Post</button>
        </form>

        <div id="commentList"></div>
    </div>

    <div class="about-section">
        <h2>Aman Preet Singh</h2>
        <p>
            Engineer. Learner. Strategist.
            Creating systems, stories and ideas that outlast noise.
        
        </p>
    </div>

<script type="module" src="script.js"></script>
</body>
</html>

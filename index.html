
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARMA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <h1 class="title">KARMA</h1>

    <div class="tile-container">
        <div class="tile" data-message="Knowledge - is dangerous when memorized, powerful when lived.">K</div>
        <div class="tile" data-message="Alignment - Even atoms align when intentions are clear.">A</div>
        <div class="tile" data-message="Resilience - Pressure introduces people to themselves.">R</div>
        <div class="tile" data-message="Maturity - Dreams remain fiction without movement.">M</div>
        <div class="tile" data-message="Abundance - Everything returns—energy, effort, love.">A</div>
    </div>

    <div id="messageBox"></div>

    <div class="comment-section">
        <h2>Leave Your Trace</h2>
        <form id="commentForm">
            <input type="text" id="nameInput" placeholder="Your name (optional)">
            <textarea id="commentInput" placeholder="Leave a thought..."></textarea>
            <button type="submit">Post</button>
        </form>

        <div id="commentList"></div>
    </div>

    <div class="about-section">
        <h2>Aman Preet Singh</h2>
        <p>
            Engineer. Learner. Strategist.
            Creating systems, stories and ideas that outlast noise.
        
        </p>
    </div>

<script type="module" src="script.js"></script>
</body>
</html>
